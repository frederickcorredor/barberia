<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>International Barbers</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --gold: #c9a227;
    --gold-light: #e6c050;
    --white: #f5f5f5;
    --gray: #1a1a1a;
    --gray-mid: #2e2e2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* HERO */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px 60px;
    overflow: hidden;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: linear-gradient(to bottom, transparent, var(--black));
    z-index: 1;
  }

  /* Diagonal gold line bg */
  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 60px,
        rgba(201,162,39,0.03) 60px,
        rgba(201,162,39,0.03) 61px
      );
    z-index: 0;
  }

  .hero-glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,162,39,0.12) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    z-index: 0;
  }

  .logo-wrap {
    position: relative;
    z-index: 2;
    animation: fadeDown 0.9s ease both;
  }

  .logo-wrap img {
    width: min(340px, 85vw);
    filter: drop-shadow(0 0 30px rgba(201,162,39,0.3));
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tagline {
    position: relative;
    z-index: 2;
    margin-top: 28px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    letter-spacing: 0.06em;
    line-height: 1;
    animation: fadeDown 0.9s 0.2s ease both;
  }

  .tagline span {
    color: var(--gold);
  }

  .sub {
    position: relative;
    z-index: 2;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(0.95rem, 3vw, 1.15rem);
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(245,245,245,0.5);
    margin-top: 10px;
    animation: fadeDown 0.9s 0.35s ease both;
  }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 32px auto;
    width: min(320px, 80vw);
    position: relative;
    z-index: 2;
    animation: fadeDown 0.9s 0.45s ease both;
  }
  .divider-line { flex: 1; height: 1px; background: var(--gold); opacity: 0.4; }
  .divider-star { color: var(--gold); font-size: 1rem; }

  /* PHOTOS STRIP */
  .photos {
    position: relative;
    z-index: 2;
    display: flex;
    gap: 12px;
    width: min(480px, 90vw);
    margin: 0 auto;
    animation: fadeUp 1s 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .photo-card {
    flex: 1;
    aspect-ratio: 3/4;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid rgba(201,162,39,0.25);
    position: relative;
  }

  .photo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    filter: grayscale(20%) contrast(1.05);
    transition: transform 0.4s ease;
  }
  .photo-card:hover img { transform: scale(1.05); }

  .photo-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
  }

  /* LINKS SECTION */
  .links-section {
    position: relative;
    z-index: 2;
    padding: 60px 20px 40px;
    max-width: 480px;
    margin: 0 auto;
    animation: fadeUp 1s 0.7s ease both;
  }

  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    margin-bottom: 28px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    padding: 18px 24px;
    margin-bottom: 14px;
    border-radius: 3px;
    text-decoration: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid transparent;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.04);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
  }
  .btn:hover::before { transform: translateX(0); }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .btn:active { transform: translateY(0); }

  .btn-icon {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 1.3rem;
  }

  .btn-text { flex: 1; }
  .btn-arrow { font-size: 1.1rem; opacity: 0.6; }

  /* WhatsApp */
  .btn-whatsapp {
    background: #0f1f0f;
    border-color: #25d36640;
    color: #25d366;
  }
  .btn-whatsapp .btn-icon { background: #25d36615; }
  .btn-whatsapp:hover { border-color: #25d366; box-shadow: 0 8px 30px rgba(37,211,102,0.2); }

  /* Instagram */
  .btn-instagram {
    background: #1a0f18;
    border-color: rgba(225,48,108,0.3);
    color: #e1306c;
  }
  .btn-instagram .btn-icon { background: rgba(225,48,108,0.08); }
  .btn-instagram:hover { border-color: #e1306c; box-shadow: 0 8px 30px rgba(225,48,108,0.2); }

  /* TikTok */
  .btn-tiktok {
    background: #0a0f14;
    border-color: rgba(105,201,208,0.3);
    color: #69c9d0;
  }
  .btn-tiktok .btn-icon { background: rgba(105,201,208,0.08); font-size: 1rem; font-weight: 900; color: #ee1d52; }
  .btn-tiktok:hover { border-color: #69c9d0; box-shadow: 0 8px 30px rgba(105,201,208,0.2); }

  /* Maps */
  .btn-maps {
    background: #100f0a;
    border-color: rgba(201,162,39,0.3);
    color: var(--gold-light);
  }
  .btn-maps .btn-icon { background: rgba(201,162,39,0.08); }
  .btn-maps:hover { border-color: var(--gold); box-shadow: 0 8px 30px rgba(201,162,39,0.2); }

  /* MAP EMBED */
  .map-section {
    position: relative;
    z-index: 2;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px 60px;
    animation: fadeUp 1s 0.85s ease both;
  }

  .map-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    margin-bottom: 16px;
  }

  .map-container {
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid rgba(201,162,39,0.25);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }

  .map-container iframe {
    display: block;
    width: 100%;
    height: 280px;
    border: none;
    filter: grayscale(30%) contrast(1.05);
  }

  /* ADDRESS BADGE */
  .address-badge {
    background: var(--gray);
    border: 1px solid rgba(201,162,39,0.2);
    border-radius: 3px;
    padding: 14px 20px;
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.05em;
    color: rgba(245,245,245,0.7);
  }
  .address-badge .pin { color: var(--gold); font-size: 1.2rem; }

  /* FOOTER */
  footer {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 28px 20px;
    border-top: 1px solid rgba(201,162,39,0.1);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(245,245,245,0.25);
  }
  footer span { color: var(--gold); opacity: 0.7; }

  /* SVG ICONS */
  .tiktok-icon {
    position: relative;
    width: 22px;
    height: 22px;
  }
</style>
</head>
